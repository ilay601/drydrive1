<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DryDrive - Premium UX Prototype</title>
    
    <!-- אייקונים מקצועיים FontAwesome -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        /* מערכת עיצוב מבוססת Apple & Material 3 (Charcoal Dark Mode) */
        :root {
            --bg-main: #0f121d;          /* רקע המכשיר - פחם כהה עמוק */
            --bg-surface: #192033;       /* רקע כרטיסיות ופאנלים צפים */
            --bg-input: #222b45;         /* רקע שדות קלט ותיבות בחירה */
            --primary: #0ea5e9;          /* כחול מותג זוהר וממוקד */
            --primary-light: #38bdf8;    /* תכלת ניאון להדגשות */
            --accent-gold: #f59e0b;      /* זהב מושלם לכוכבי הדירוג */
            --border-glow: rgba(56, 189, 248, 0.12); /* גבול זוהר עדין */
            --border-soft: rgba(255, 255, 255, 0.05); /* קו הפרדה חצי שקוף */
            --text-main: #f8fafc;        /* טקסט ראשי בהיר וחלק */
            --text-muted: #94a3b8;       /* טקסט משני אפרפר */
            --radius-xl: 24px;           /* פינות עגולות רכות לכרטיסיות */
            --radius-lg: 16px;           /* פינות עגולות לשדות קלט וטפסים */
            --radius-sm: 8px;
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #090b11;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* שלד הסמארטפון */
        #app-wrapper {
            width: 100%; max-width: 412px; height: 100%; max-height: 844px;
            background-color: var(--bg-main); border-radius: 44px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8), inset 0 1px 2px rgba(255,255,255,0.1);
            display: flex; flex-direction: column; overflow: hidden; position: relative;
            border: 12px solid #1e293b;
        }

        /* סרגל עליון יוקרתי (Glassmorphism מלא) */
        #main-header {
            background-color: rgba(25, 32, 51, 0.85); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-soft);
            height: 68px; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; z-index: 10;
        }

        .brand-title {
            font-size: 1.4rem; font-weight: 800; color: var(--text-main);
            letter-spacing: -0.5px; background: linear-gradient(135deg, #fff, var(--text-muted));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .nav-icon-btn {
            background: var(--bg-surface); border: 1px solid var(--border-soft); font-size: 1.1rem; color: var(--text-main);
            cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%;
            transition: background 0.2s;
        }
        .nav-icon-btn:active { background: var(--bg-input); }

        /* אזור התוכן הראשי */
        #app-content { flex-grow: 1; overflow-y: auto; padding: 20px; }
        #app-content::-webkit-scrollbar { display: none; }
        .app-screen { display: flex; flex-direction: column; height: 100%; }
        .hidden { display: none !important; }
        /* המשך עיצוב רכיבים אינטראקטיביים */
        .welcome-hero { text-align: center; margin: 15px 0 25px 0; }
        .hero-icon { font-size: 3.8rem; color: var(--accent-gold); margin-bottom: 12px; filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.3)); }
        .welcome-hero h2 { font-size: 1.6rem; font-weight: 800; color: var(--text-main); }
        .welcome-hero p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; padding: 0 10px; }

        .search-container, .host-form-container {
            background-color: var(--bg-surface); border-radius: var(--radius-xl); padding: 24px;
            border: 1px solid var(--border-glow); box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        label { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrapper { position: relative; display: flex; align-items: center; margin-bottom: 18px; }
        .input-icon { position: absolute; right: 16px; color: var(--primary-light); font-size: 1.1rem; }

        select, input[type="text"], input[type="number"] {
            width: 100%; padding: 14px 44px 14px 16px; border: 1px solid var(--border-soft);
            border-radius: var(--radius-lg); background-color: var(--bg-input); font-size: 0.95rem; color: var(--text-main);
            transition: all 0.2s;
        }
        select:focus, input:focus { outline: none; border-color: var(--primary); background-color: var(--bg-surface); }

        .primary-btn {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 16px; border-radius: var(--radius-lg); font-size: 1rem; font-weight: 700;
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.25); transition: all 0.2s;
        }
        .primary-btn:active { transform: scale(0.98); opacity: 0.9; }

        /* כרטיסיות המדיה העשירות */
        .results-header { font-size: 1.1rem; font-weight: 800; margin-bottom: 18px; color: var(--text-main); }
        
        .shower-card {
            background: var(--bg-surface); border: 1px solid var(--border-soft); border-radius: var(--radius-xl);
            padding: 16px; margin-bottom: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; gap: 10px;
        }

        .card-media-block { display: flex; gap: 14px; align-items: flex-start; }
        
        .shower-image-frame {
            width: 85px; height: 85px; border-radius: var(--radius-lg);
            object-fit: cover; border: 1px solid var(--border-fine); background-color: var(--bg-input);
        }

        .card-info-side { flex-grow: 1; display: flex; flex-direction: column; gap: 4px; }
        .card-info-side h3 { font-size: 1.15rem; font-weight: 800; color: var(--text-main); }
        
        .price-tag-premium { font-size: 1.35rem; font-weight: 900; color: var(--primary-light); text-align: left; }
        .feature-badge { background: rgba(14, 165, 233, 0.08); color: var(--primary-light); font-size: 0.72rem; padding: 5px 12px; border-radius: 30px; font-weight: 600; border: 1px solid rgba(14, 165, 233, 0.15); margin-left: 6px; }
        .shower-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-soft); padding-top: 10px; margin-top: 4px; }
        .book-btn-premium { background: var(--text-main); color: var(--bg-main); border: none; padding: 10px 20px; border-radius: var(--radius-lg); font-weight: 800; font-size: 0.9rem; cursor: pointer; }

        /* תפריט תחתון צף פרימיום */
        #bottom-nav {
            background-color: rgba(25, 32, 51, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-soft); height: 75px; display: flex; justify-content: space-around; align-items: center; z-index: 10; padding-bottom: 8px;
        }
        .nav-item { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #64748b; cursor: pointer; font-size: 0.8rem; font-weight: 600; flex-grow: 1; }
        .nav-item.active { color: var(--primary-light); }
        .nav-item i { font-size: 1.3rem; }

        .checkbox-group { display: flex; flex-direction: column; gap: 6px; font-size: 0.85rem; margin-top: 4px; }
        .checkbox-group label { display: flex; align-items: center; font-weight: 500; color: var(--text-main); cursor: pointer; }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary-light); margin-left: 10px; cursor: pointer; }
        
        /* רכיב קבלה וטיימר */
        .booking-icon-wrapper { width: 60px; height: 60px; background: rgba(14, 165, 233, 0.1); color: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; margin: 0 auto 12px auto; }
        .receipt-details { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; text-align: right; border-top: 1px dashed rgba(56, 189, 248, 0.2); padding-top: 12px; }
        .receipt-row { display: flex; justify-content: space-between; font-size: 0.9rem; color: var(--text-main); }
        .timer-highlight { background: rgba(239, 68, 68, 0.1); color: #f87171; padding: 4px 10px; border-radius: 8px; font-weight: 700; font-family: monospace; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>
    <div id="app-wrapper">
        <header id="main-header">
            <button id="back-btn" class="nav-icon-btn hidden" onclick="navigateToScreen('screen-welcome')"><i class="fa-solid fa-arrow-right"></i></button>
            <div class="brand-title">DryDrive</div>
            <button class="nav-icon-btn"><i class="fa-solid fa-circle-user"></i></button>
        </header>
        <main id="app-content">
            <!-- מסך 1: בית -->
            <section id="screen-welcome" class="app-screen">
                <div class="welcome-hero"><i class="fa-solid fa-umbrella-beach hero-icon"></i><h2>רטובים ומלוחים?</h2><p>מצאו מרחב בטוח לרענון, מקלחת חמה ומגבת יבשה במרחק דקות מהחוף שלכם.</p></div>
                <div class="search-container">
                    <label>איפה אתם נמצאים כרגע?</label>
                    <div class="input-wrapper"><i class="fa-solid fa-location-dot input-icon"></i>
                        <select id="beach-selector">
                            <option value="palmahim">חוף פלמחים</option><option value="gordon">חוף גורדון (תל אביב)</option><option value="sironit">חוף סירונית (נתניה)</option><option value="mika">חוף מיקה (אילת)</option>
                        </select>
                    </div>
                    <div style="background: rgba(22, 163, 74, 0.06); border: 1px solid rgba(22, 163, 74, 0.2); border-radius: var(--radius-lg); padding: 12px; margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between;">
                        <span style="font-size: 0.85rem; font-weight: 700; color: #4ade80;"><i class="fa-solid fa-user-shield" style="margin-left: 6px;"></i> הצג רק מארחות נשים (בטוח)</span>
                        <input type="checkbox" id="filter-women-only">
                    </div>
                    <button class="primary-btn" onclick="handleSearch()"><span>חפשו מקלחות פנויות סביבי</span><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </section>
            <!-- מסך 2: תוצאות -->
            <section id="screen-results" class="app-screen hidden"><div class="results-header" id="results-count">0 מקלחות נמצאו</div><div id="showers-list-container"></div></section>
            <!-- מסך 3: מארח -->
            <section id="screen-host" class="app-screen hidden">
                <div class="host-form-container">
                    <div style="text-align:center; margin-bottom:12px;"><h2 style="color:var(--text-main); font-size:1.2rem;">הוסף את תחנת הרענון שלך</h2></div>
                    <div style="display:flex; flex-direction:column; gap:10px;">
                        <div><label>שם המארח / שם העסק:</label><input type="text" id="h-name" placeholder="הדירה של אלון"></div>
                        <div><label>מגדר המארח/ת:</label><select id="h-gender"><option value="male">גבר</option><option value="female">אישה 🛡️</option><option value="business">עסק מקומי / ספא</option></select></div>
                        <div><label>שיוך לחוף הקרוב:</label><select id="h-beach"><option value="palmahim">חוף פלמחים</option><option value="gordon">חוף גורדון (תל אביב)</option><option value="sironit">חוף סירונית (נתניה)</option><option value="mika">חוף מיקה (אילת)</option></select></div>
                        <div><label>באיזו עיר התחנה נמצאת?</label><input type="text" id="h-city" placeholder="לדוגמה: נתניה"></div>
                        <div><label>כתובת מלאה ומספר דירה:</label><input type="text" id="h-address" placeholder="רחוב הירקון 45, דירה 4"></div>
                        <div><label>סנכרון מיקום GPS:</label><button class="primary-btn" id="gps-btn" style="background:#3b82f6; padding:10px; font-size:0.85rem;" onclick="captureLiveGPS(event)"><i class="fa-solid fa-location-crosshairs"></i><span>סנכרן מיקום מהלוויין</span></button><div id="gps-status" style="font-size:0.75rem; color:var(--text-muted); margin-top:4px; font-weight:600; text-align:center;">המיקום לא אומת</div></div>
                        <div><label>מחיר ל-15 דקות (ב-₪):</label><input type="number" id="h-price" placeholder="40"></div>
                        <div><label>מה אתה מספק?</label><div class="checkbox-group"><label><input type="checkbox" class="amenity" value="מקלחת חמה"> מקלחת חמה 🚿</label><label><input type="checkbox" class="amenity" value="מגבת נקייה"> מגבת יבשה 🧼</label><label><input type="checkbox" class="amenity" value="שמפו וסבון"> שמפו 🧴</label></div></div>
    <script>
        // חיבור ישיר לשרת הענן האמיתי שלך ב-Render
        const SERVER_URL = "https://onrender.com";
        
        // מפת המלצות גיאוגרפיות למיון ערים סמוכות
        const GEO_RELATIONS = {
            palmahim: { city: "ראשון לציון", neighbors: ["נס ציונה", "רחובות", "יבנה", "בת ים"] },
            gordon: { city: "תל אביב", neighbors: ["רמת גן", "גבעתיים", "בני ברק", "חולון", "הרצליה"] },
            sironit: { city: "נתניה", neighbors: ["כפר יונה", "הרצליה", "רעננה", "כפר סבא", "חדרה"] },
            mika: { city: "אילת", neighbors: ["אילות", "חבל אילות"] }
        };

        let currentCapturedLat = null; let currentCapturedLng = null; let bookingTimerInterval = null;

        // מנגנון ניווט ומעבר מסכים
        function navigateToScreen(screenId) {
            document.querySelectorAll('.app-screen').forEach(s => s.classList.add('hidden'));
            const target = document.getElementById(screenId);
            if (target) target.classList.remove('hidden');
            
            const backBtn = document.getElementById('back-btn');
            if (screenId === 'screen-welcome') backBtn.classList.add('hidden'); else backBtn.classList.remove('hidden');

            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (screenId === 'screen-welcome') document.getElementById('tab-home').classList.add('active');
            if (screenId === 'screen-results') document.getElementById('tab-results').classList.add('active');
            if (screenId === 'screen-host') document.getElementById('tab-host').classList.add('active');
            if (screenId === 'screen-booking') document.getElementById('tab-results').classList.add('active');
        }

        // הפעלת GPS לווייני לקליטת נ"צ הדירה
        function captureLiveGPS(event) {
            event.preventDefault(); const statusDisplay = document.getElementById('gps-status');
            if (!navigator.geolocation) { statusDisplay.textContent = "אין תמיכה ב-GPS"; return; }
            statusDisplay.textContent = "מאמת מיקום דירה...";
            navigator.geolocation.getCurrentPosition(
                (position) => { 
                    currentCapturedLat = position.coords.latitude; 
                    currentCapturedLng = position.coords.longitude; 
                    statusDisplay.innerHTML = "מיקום אומת! נ" + "צ: " + currentCapturedLat.toFixed(4) + ", " + currentCapturedLng.toFixed(4); 
                },
                () => { 
                    statusDisplay.innerHTML = "לוויין חסום. המיקום סומל אוטומטית לפי החוף."; 
                    currentCapturedLat = 32.0827; currentCapturedLng = 34.7674; 
                }
            );
        }

        // פרסום תחנה ושמירתה בענן האמיתי ב-Render
        async function publishStation() {
            const name = document.getElementById('h-name').value.trim(); const gender = document.getElementById('h-gender').value; const beach = document.getElementById('h-beach').value; const city = document.getElementById('h-city').value.trim(); const address = document.getElementById('h-address').value.trim(); const price = document.getElementById('h-price').value.trim();
            if (!name || !city || !address || !price) { alert("נא למלא את כל השדות!"); return; }
            const amenities = Array.from(document.querySelectorAll('.amenity:checked')).map(b => b.value);
            
            const newShower = { beachId: beach, id: Date.now(), hostName: name, hostGender: gender, hostCity: city, hostAddress: address, price: price, lat: currentCapturedLat || 32.0827, lng: currentCapturedLng || 34.7674, features: amenities.length > 0 ? amenities : ["מקלחת נקייה"] };

            try {
                const response = await fetch(`${SERVER_URL}/api/publish`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newShower)
                });
                const result = await response.json();
                if (result.success) {
                    alert("זהותך אומתה! התחנה נשמרה בשרת ה-Cloud ופתוחה לכולם ברשת!");
                    document.getElementById('h-name').value = ""; document.getElementById('h-city').value = ""; document.getElementById('h-address').value = ""; document.getElementById('h-price').value = ""; document.getElementById('gps-status').textContent = "המיקום לא אומת"; document.querySelectorAll('.amenity').forEach(b => b.checked = false); currentCapturedLat = null; currentCapturedLng = null;
                    navigateToScreen('screen-welcome');
                }
            } catch (error) {
                alert("תקלה בשמירת המידע בשרת הרשת.");
            }
        }
        // משיכת נתונים חיה מהענן וחלוקה לקטגוריות
        async function handleSearch() {
            const beach = document.getElementById('beach-selector').value; const womenOnlyChecked = document.getElementById('filter-women-only').checked; const container = document.getElementById('showers-list-container'); const countText = document.getElementById('results-count');
            container.innerHTML = `<p style="text-align:center; color:#94a3b8; margin-top:40px;">🔄 קורא לשרת בענן ומחפש מקלחות...</p>`; navigateToScreen('screen-results');

            try {
                const response = await fetch(`${SERVER_URL}/api/showers/${beach}`);
                let list = await response.json();

                if (womenOnlyChecked) { list = list.filter(s => s.hostGender === 'female' || s.hostGender === 'business'); }
                if (!list || list.length === 0) { countText.textContent = "0 מקלחות נמצאו"; container.innerHTML = `<div style="text-align:center; color:#64748b; margin-top:40px; font-weight:600;"><p>אין עדיין תחנות פעילות בחוף זה.</p></div>`; return; }

                const relation = GEO_RELATIONS[beach]; const exact = []; const recommended = []; const fallback = [];
                list.forEach(s => { const hostCity = (s.hostCity || "").trim(); if (hostCity === relation.city) exact.push(s); else if (relation.neighbors.includes(hostCity)) recommended.push(s); else fallback.push(s); });
                
                countText.textContent = "נמצאו " + list.length + " אפשרויות רענון מאובטחות:";
                if (exact.length > 0) { insertSectionHeader(container, "באותה העיר (" + relation.city + ")"); exact.forEach(s => insertCardHTML(container, s)); }
                if (recommended.length > 0) { insertSectionHeader(container, "מומלץ בדרך (ערים סמוכות)"); recommended.forEach(s => insertCardHTML(container, s)); }
                if (fallback.length > 0) { insertSectionHeader(container, "אפשרויות רחוקות יותר"); fallback.forEach(s => insertCardHTML(container, s)); }
            } catch (error) {
                container.innerHTML = `<p style="text-align:center; color:#ef4444; margin-top:40px;">שגיאת חיבור לשרת ה-Cloud.</p>`;
            }
        }

        function insertSectionHeader(container, title) { const header = document.createElement('div'); header.style = "font-size:0.85rem; font-weight:700; color:#38bdf8; margin:15px 0 8px 0; text-transform:uppercase;"; header.textContent = title; container.appendChild(header); }
        
        function insertCardHTML(container, s) {
            const card = document.createElement('div'); card.className = 'shower-card'; const badges = s.features.map(f => `<span class="feature-badge">${f}</span>`).join('');
            const badgeSecure = s.hostGender === 'female' ? '<span style="font-size:0.7rem; background:rgba(219,39,119,0.1); color:#f472b6; padding:2px 6px; border-radius:4px; font-weight:bold; border:1px solid rgba(219,39,119,0.2); margin-right:6px;"><i class="fa-solid fa-venus"></i> מארחת אישה 🛡️</span>' : '';
            
            // ניקוי תווים מיוחדים כדי למנוע קריסה בכפתור ההזמנה
            const cleanHostName = s.hostName.replace(/'/g, "\\'").replace(/"/g, '\\"');
            const cleanAddress = s.hostAddress.replace(/'/g, "\\'").replace(/"/g, '\\"');
            const cleanCity = s.hostCity.replace(/'/g, "\\'").replace(/"/g, '\\"');

            card.innerHTML = `
                <div class="card-media-block">
                    <img class="shower-image-frame" src="https://unsplash.com" alt="Shower">
                    <div class="card-info-side">
                        <div class="card-header-row">
                            <div>
                                <h3 style="margin:0; display:flex; align-items:center;">${s.hostName} ${badgeSecure}</h3>
                                <span style="font-size:0.75rem; background:rgba(14,165,233,0.1); color:var(--primary-light); padding:2px 6px; border-radius:4px; font-weight:bold; display:inline-block; margin-top:2px;">📍 ${s.hostCity}</span>
                            </div>
                            <span class="price-tag-premium">₪${s.price}</span>
                        </div>
                        <p style="font-size:0.8rem; color:var(--text-muted); margin-top:4px;"><i class="fa-solid fa-map-location-dot"></i> כתובת: ${s.hostAddress}</p>
                    </div>
                </div>
                <div style="margin:4px 0;">${badges}</div>
                <div class="shower-footer">
                    <span style="font-size:0.8rem; color:#4ade80; font-weight:600;"><i class="fa-solid fa-user-check"></i> זהות מאומתת (⭐ 5.0)</span>
                    <button class="book-btn-premium" onclick="initLiveBookingScreen('${cleanHostName}', '${s.price}', '${cleanAddress}', '${cleanCity}')">הזמן מקום</button>
                </div>
            `;
            container.appendChild(card);
        }

        // מסך קבלה וטיימר מובנה
        function initLiveBookingScreen(hostName, price, address, city) {
            const bookingScreen = document.getElementById('screen-booking'); navigateToScreen('screen-booking');
            bookingScreen.innerHTML = `
                <div class="booking-card">
                    <div class="booking-icon-wrapper"><i class="fa-solid fa-receipt"></i></div>
                    <h2 style="font-size:1.2rem; color:var(--text-main); margin-bottom:4px;">סיכום נעילת תור</h2>
                    <div class="receipt-details">
                        <div class="receipt-row"><span>מארח/ת:</span><strong>${hostName}</strong></div>
                        <div class="receipt-row"><span>כתובת הגעה:</span><span style="color:var(--primary-light); font-weight:500;">${address}, ${city}</span></div>
                        <div class="receipt-row"><span>זמן למימוש:</span><span id="countdown-timer" class="timer-highlight">15:00</span></div>
                        <div class="receipt-row" style="border-top:1px solid var(--border-fine); padding-top:8px; font-weight:800;"><span>מחיר סופי:</span><span class="price-tag-premium">₪${price}</span></div>
                    </div>
                    <button class="primary-btn" style="background:var(--text-main); color:var(--bg-main); margin-top:20px;" onclick="processSecurePayment('${hostName.replace(/'/g, "\\'")}', '${address.replace(/'/g, "\\'")}', '${city.replace(/'/g, "\\'")}')">אשר והפעל ניווט</button>
                </div>
            `;
            let timer = 900; clearInterval(bookingTimerInterval);
            bookingTimerInterval = setInterval(() => {
                let min = Math.floor(timer / 60); let sec = timer % 60;
                min = min < 10 ? "0" + min : min; sec = sec < 10 ? "0" + sec : sec;
                const d = document.getElementById('countdown-timer'); if (d) d.textContent = min + ":" + sec;
                if (--timer < 0) { clearInterval(bookingTimerInterval); alert("⏰ פג זמן ההזמנה!"); navigateToScreen('screen-welcome'); }
            }, 1000);
        }

        // 👑 פונקציית תיקון הניווט הסופית והמדויקת של Waze
        function processSecurePayment(hostName, address, city) {
            clearInterval(bookingTimerInterval); const bookingScreen = document.getElementById('screen-booking');
            
            // איחוד וקידוד טקסט הכתובת המלאה עבור ה-API של Waze
            const destinationQuery = hostName + " " + address + " " + city;
            const wazeIntentUrl = "waze://?q=" + encodeURIComponent(destinationQuery) + "&navigate=yes";
            const wazeWebUrl = "https://waze.com" + encodeURIComponent(destinationQuery) + "&navigate=yes";

            bookingScreen.innerHTML = `
                <div style="text-align:center; padding:20px 10px;">
                    <div style="font-size:4rem; color:#4ade80; margin-bottom:15px;"><i class="fa-solid fa-circle-check"></i></div>
                    <h2 style="font-size:1.3rem; margin-bottom:4px; color:var(--text-main);">התור שוריין בהצלחה!</h2>
                    <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:20px;">הכתובת אובטחה ושמורה עבורך.</p>
                    <div class="search-container" style="text-align:right; margin-bottom:20px; background:var(--bg-input);">
                        <p style="font-weight:600; font-size:0.9rem; color:var(--primary-light); margin-bottom:10px;">${hostName} - ${address}, ${city}</p>
                        <button class="primary-btn" style="background:#16a34a;" onclick="window.location.href='${wazeIntentUrl}'; setTimeout(function(){ window.open('${wazeWebUrl}', '_blank'); }, 600);">
                            <i class="fa-solid fa-diamond-turn-right"></i>
                            <span>פתח ניווט ישיר ב-Waze</span>
                        </button>
                    </div>
                    <button class="primary-btn" style="background:var(--text-muted); box-shadow:none;" onclick="navigateToScreen('screen-welcome')">חזרה לראשי</button>
                </div>
            `;
        }
    </script>
</body>
</html>
<script>
        // הכתובת הרשמית והחיה של שרת הענן שלך ב-Render
        const SERVER_URL = "https://onrender.com";
        
        const GEO_RELATIONS = {
            palmahim: { city: "ראשון לציון", neighbors: ["נס ציונה", "רחובות", "יבנה", "בת ים"] },
            gordon: { city: "תל אביב", neighbors: ["רמת גן", "גבעתיים", "בני ברק", "חולון", "הרצליה"] },
            sironit: { city: "נתניה", neighbors: ["כפר יונה", "הרצליה", "רעננה", "כפר סבא", "חדרה"] },
            mika: { city: "אילת", neighbors: ["אילות", "חבל אילות"] }
        };

        let currentCapturedLat = null; let currentCapturedLng = null; let bookingTimerInterval = null;

        function navigateToScreen(screenId) {
            document.querySelectorAll('.app-screen').forEach(s => s.classList.add('hidden'));
            const target = document.getElementById(screenId);
            if (target) target.classList.remove('hidden');
            
            const backBtn = document.getElementById('back-btn');
            if (screenId === 'screen-welcome') backBtn.classList.add('hidden'); else backBtn.classList.remove('hidden');

            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (screenId === 'screen-welcome') document.getElementById('tab-home').classList.add('active');
            if (screenId === 'screen-results') document.getElementById('tab-results').classList.add('active');
            if (screenId === 'screen-host') document.getElementById('tab-host').classList.add('active');
            if (screenId === 'screen-booking') document.getElementById('tab-results').classList.add('active');
        }

        function captureLiveGPS(event) {
            event.preventDefault(); const statusDisplay = document.getElementById('gps-status');
            if (!navigator.geolocation) { statusDisplay.textContent = "אין תמיכה ב-GPS"; return; }
            statusDisplay.textContent = "מאמת מיקום דירה...";
            navigator.geolocation.getCurrentPosition(
                (position) => { 
                    currentCapturedLat = position.coords.latitude; 
                    currentCapturedLng = position.coords.longitude; 
                    statusDisplay.innerHTML = "מיקום אומת! נ" + "צ: " + currentCapturedLat.toFixed(4) + ", " + currentCapturedLng.toFixed(4); 
                },
                () => { 
                    statusDisplay.innerHTML = "מיקום סומל אוטומטית לפי אזור החוף."; 
                    currentCapturedLat = 32.0827; currentCapturedLng = 34.7674; 
                }
            );
        }

        // 🔥 תיקון חיווט חגיגי: הפונקציה ששולחת את המקלחת פיזית לאינטרנט של Render לכולם!
        async function publishStation() {
            const name = document.getElementById('h-name').value.trim(); 
            const gender = document.getElementById('h-gender').value; 
            const beach = document.getElementById('h-beach').value; 
            const city = document.getElementById('h-city').value.trim(); 
            const address = document.getElementById('h-address').value.trim(); 
            const price = document.getElementById('h-price').value.trim();

            if (!name || !city || !address || !price) { 
                alert("⚠️ נא למלא את כל השדות כדי לפרסם את המקלחת!"); 
                return; 
            }

            const amenities = Array.from(document.querySelectorAll('.amenity:checked')).map(b => b.value);
            
            // בניית האובייקט המדויק שהשרת מצפה לקבל
            const newShower = { 
                beachId: beach, 
                id: Date.now(), 
                hostName: name, 
                hostGender: gender, 
                hostCity: city, 
                hostAddress: address, 
                price: price, 
                lat: currentCapturedLat || 32.0827, 
                lng: currentCapturedLng || 34.7674, 
                features: amenities.length > 0 ? amenities : ["מקלחת נקייה"] 
            };

            try {
                // שיגור הבקשה לענן של Render
                const response = await fetch(SERVER_URL + "/api/publish", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newShower)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert("🎉 הסטארט-אפ חי ברשת! התחנה פורסמה בשרת ה-Cloud ופתוחה לכולם!");
                    document.getElementById('h-name').value = ""; document.getElementById('h-city').value = ""; document.getElementById('h-address').value = ""; document.getElementById('h-price').value = ""; document.getElementById('gps-status').textContent = "המיקום לא אומת"; document.querySelectorAll('.amenity').forEach(b => b.checked = false); currentCapturedLat = null; currentCapturedLng = null;
                    navigateToScreen('screen-welcome');
                }
            } catch (error) {
                console.error(error);
                alert("❌ תקלה בתקשורת: השרת ב-Render לא הגיב בהצלחה.");
            }
        }
        // משיכת נתונים חיה מהענן של Render וחלוקה לקטגוריות
        async function handleSearch() {
            const beach = document.getElementById('beach-selector').value; 
            const womenOnlyChecked = document.getElementById('filter-women-only').checked; 
            const container = document.getElementById('showers-list-container'); 
            const countText = document.getElementById('results-count');
            
            container.innerHTML = `<p style="text-align:center; color:#94a3b8; margin-top:40px;">🔄 קורא לשרת בענן ומחפש מקלחות...</p>`; 
            navigateToScreen('screen-results');

            try {
                const response = await fetch(SERVER_URL + "/api/showers/" + beach);
                let list = await response.json();

                if (womenOnlyChecked) { list = list.filter(s => s.hostGender === 'female' || s.hostGender === 'business'); }
                if (!list || list.length === 0) { countText.textContent = "0 מקלחות נמצאו"; container.innerHTML = `<div style="text-align:center; color:#64748b; margin-top:40px; font-weight:600;"><p>אין עדיין תחנות פעילות בחוף זה.</p></div>`; return; }

                const relation = GEO_RELATIONS[beach]; const exact = []; const recommended = []; const fallback = [];
                list.forEach(s => { const hostCity = (s.hostCity || "").trim(); if (hostCity === relation.city) exact.push(s); else if (relation.neighbors.includes(hostCity)) recommended.push(s); else fallback.push(s); });
                
                countText.textContent = "נמצאו " + list.length + " אפשרויות רענון מאובטחות:";
                if (exact.length > 0) { insertSectionHeader(container, "באותה העיר (" + relation.city + ")"); exact.forEach(s => insertCardHTML(container, s)); }
                if (recommended.length > 0) { insertSectionHeader(container, "מומלץ בדרך (ערים סמוכות)"); recommended.forEach(s => insertCardHTML(container, s)); }
                if (fallback.length > 0) { insertSectionHeader(container, "אפשרויות רחוקות יותר"); fallback.forEach(s => insertCardHTML(container, s)); }
            } catch (error) {
                container.innerHTML = `<p style="text-align:center; color:#ef4444; margin-top:40px;">שגיאת חיבור לשרת ה-Cloud.</p>`;
            }
        }

        function insertSectionHeader(container, title) { const header = document.createElement('div'); header.style = "font-size:0.85rem; font-weight:700; color:#38bdf8; margin:15px 0 8px 0; text-transform:uppercase;"; header.textContent = title; container.appendChild(header); }
        
        function insertCardHTML(container, s) {
            const card = document.createElement('div'); card.className = 'shower-card'; const badges = s.features.map(f => `<span class="feature-badge">${f}</span>`).join('');
            const badgeSecure = s.hostGender === 'female' ? '<span style="font-size:0.7rem; background:rgba(219,39,119,0.1); color:#f472b6; padding:2px 6px; border-radius:4px; font-weight:bold; border:1px solid rgba(219,39,119,0.2); margin-right:6px;"><i class="fa-solid fa-venus"></i> מארחת אישה 🛡️</span>' : '';
            
            const cleanHostName = s.hostName.replace(/'/g, "\\'").replace(/"/g, '\\"');
            const cleanAddress = s.hostAddress.replace(/'/g, "\\'").replace(/"/g, '\\"');
            const cleanCity = s.hostCity.replace(/'/g, "\\'").replace(/"/g, '\\"');

            card.innerHTML = `
                <div class="card-media-block">
                    <img class="shower-image-frame" src="https://unsplash.com" alt="Shower">
                    <div class="card-info-side">
                        <div class="card-header-row">
                            <div>
                                <h3 style="margin:0; display:flex; align-items:center;">${s.hostName} ${badgeSecure}</h3>
                                <span style="font-size:0.75rem; background:rgba(14,165,233,0.1); color:var(--primary-light); padding:2px 6px; border-radius:4px; font-weight:bold; display:inline-block; margin-top:2px;">📍 ${s.hostCity}</span>
                            </div>
                            <span class="price-tag-premium">₪${s.price}</span>
                        </div>
                        <p style="font-size:0.8rem; color:var(--text-muted); margin-top:4px;"><i class="fa-solid fa-map-location-dot"></i> כתובת: ${s.hostAddress}</p>
                    </div>
                </div>
                <div style="margin:4px 0;">${badges}</div>
                <div class="shower-footer">
                    <span style="font-size:0.8rem; color:#4ade80; font-weight:600;"><i class="fa-solid fa-user-check"></i> זהות מאומתת (⭐ 5.0)</span>
                    <!-- העברת נקודות הציור (lat, lng) ישירות למסך ההזמנה הבא -->
                    <button class="book-btn-premium" onclick="initLiveBookingScreen('${cleanHostName}', '${s.price}', '${cleanAddress}', '${cleanCity}', '${s.lat}', '${s.lng}')">הזמן מקום</button>
                </div>
            `;
            container.appendChild(card);
        }

        // מסך קבלה וטיימר מובנה
        function initLiveBookingScreen(hostName, price, address, city, lat, lng) {
            const bookingScreen = document.getElementById('screen-booking'); navigateToScreen('screen-booking');
            bookingScreen.innerHTML = `
                <div class="booking-card">
                    <div class="booking-icon-wrapper"><i class="fa-solid fa-receipt"></i></div>
                    <h2 style="font-size:1.2rem; color:var(--text-main); margin-bottom:4px;">סיכום נעילת תור</h2>
                    <div class="receipt-details">
                        <div class="receipt-row"><span>מארח/ת:</span><strong>${hostName}</strong></div>
                        <div class="receipt-row"><span>כתובת הגעה:</span><span style="color:var(--primary-light); font-weight:500;">${address}, ${city}</span></div>
                        <div class="receipt-row"><span>זמן למימוש:</span><span id="countdown-timer" class="timer-highlight">15:00</span></div>
                        <div class="receipt-row" style="border-top:1px solid var(--border-fine); padding-top:8px; font-weight:800;"><span>מחיר סופי:</span><span class="price-tag-premium">₪${price}</span></div>
                    </div>
                    <button class="primary-btn" style="background:var(--text-main); color:var(--bg-main); margin-top:20px;" onclick="processSecurePayment('${hostName.replace(/'/g, "\\'")}', '${address.replace(/'/g, "\\'")}', '${city.replace(/'/g, "\\'")}', '${lat}', '${lng}')">אשר והפעל ניווט</button>
                </div>
            `;
            let timer = 900; clearInterval(bookingTimerInterval);
            bookingTimerInterval = setInterval(() => {
                let min = Math.floor(timer / 60); let sec = timer % 60;
                min = min < 10 ? "0" + min : min; sec = sec < 10 ? "0" + sec : sec;
                const d = document.getElementById('countdown-timer'); if (d) d.textContent = min + ":" + sec;
                if (--timer < 0) { clearInterval(bookingTimerInterval); alert("⏰ פג זמן ההזמנה!"); navigateToScreen('screen-welcome'); }
            }, 1000);
        }

        // 👑 הניווט הלווייני המושלם: שימוש בקואורדינטות ה-GPS המדויקות (lat, lng) ישירות בתוך ה-API של Waze!
        function processSecurePayment(hostName, address, city, lat, lng) {
            clearInterval(bookingTimerInterval); const bookingScreen = document.getElementById('screen-booking');
            
            // שימוש ב-ll (Latitude & Longitude) של הלוויין במקום טקסט חופשי!
            const wazeIntentUrl = "waze://?ll=" + lat + "," + lng + "&navigate=yes";
            const wazeWebUrl = "https://waze.com" + lat + "," + lng + "&navigate=yes";

            bookingScreen.innerHTML = `
                <div style="text-align:center; padding:20px 10px;">
                    <div style="font-size:4rem; color:#4ade80; margin-bottom:15px;"><i class="fa-solid fa-circle-check"></i></div>
                    <h2 style="font-size:1.3rem; margin-bottom:4px; color:var(--text-main);">התור שוריין בהצלחה!</h2>
                    <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:20px;">הכתובת אובטחה ושמורה עבורך.</p>
                    <div class="search-container" style="text-align:right; margin-bottom:20px; background:var(--bg-input);">
                        <p style="font-weight:600; font-size:0.9rem; color:var(--primary-light); margin-bottom:10px;">${hostName} - ${address}, ${city}</p>
                        <!-- הניווט לוקח אוטומטית את נקודת הלוויין של המכשיר -->
                        <button class="primary-btn" style="background:#16a34a;" onclick="window.location.href='${wazeIntentUrl}'; setTimeout(function(){ window.open('${wazeWebUrl}', '_blank'); }, 600);">
                            <i class="fa-solid fa-diamond-turn-right"></i>
                            <span>פתח ניווט גיאוגרפי ב-Waze</span>
                        </button>
                    </div>
                    <button class="primary-btn" style="background:var(--text-muted); box-shadow:none;" onclick="navigateToScreen('screen-welcome')">חזרה לראשי</button>
                </div>
            `;
        }
    </script>
</body>
</html>
                        
<!-- ========================================================= -->
<!-- תיקון אוטומטי בסוף הקובץ: החזרת התפריט התחתון למקומו -->
<!-- ========================================================= -->
<script>
    window.addEventListener('DOMContentLoaded', () => {
        const appWrapper = document.getElementById('app-wrapper');
        const bottomNav = document.getElementById('bottom-nav');
        
        // אם שני האלמנטים קיימים, נחזיר את התפריט אל תוך שלד האפליקציה
        if (appWrapper && bottomNav) {
            appWrapper.appendChild(bottomNav);
        }
    });
</script>
<!-- ========================================================= -->
<!-- תיקון CSS חסין בסוף הקובץ: כפיית הצגת התפריט התחתון -->
<!-- ========================================================= -->
<style>
    #bottom-nav {
        position: fixed !important;
        bottom: 0 !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        width: 100% !important;
        max-width: 388px; /* מתאים בדיוק לרוחב הפנימי של המכשיר */
        border-bottom-left-radius: 28px !important; /* מעגל את הפינות שיתאימו לטלפון */
        border-bottom-right-radius: 28px !important;
    }
</style>
<!-- ========================================================= -->
<!-- תיקון סופי חסין: הזרקת תפריט תחתון עצמאי ומאבטח מסכים -->
<!-- ========================================================= -->
<nav id="fixed-bottom-nav">
    <button class="fixed-nav-item fixed-active" onclick="triggerFixedNav('screen-welcome', this)"><i class="fa-solid fa-house"></i><span>ראשי</span></button>
    <button class="fixed-nav-item" onclick="triggerFixedNav('screen-results', this)"><i class="fa-solid fa-shower"></i><span>מקלחות</span></button>
    <button class="fixed-nav-item" onclick="triggerFixedNav('screen-host', this)"><i class="fa-solid fa-house-medical"></i><span>להיות מארח</span></button>
</nav>

<style>
    /* העלמת התפריט הישן שנשבר */
    #bottom-nav { display: none !important; }
    
    /* עיצוב תפריט חדש, צף וחסין שגיאות בדיוק מעל תחתית המכשיר */
    #fixed-bottom-nav {
        position: fixed !important; bottom: 12px !important; left: 50% !important;
        transform: translateX(-50%) !important; width: calc(100% - 24px) !important;
        max-width: 364px; height: 68px; background-color: rgba(25, 32, 51, 0.95) !important;
        backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px; display: flex !important; justify-content: space-around;
        align-items: center; z-index: 99999 !important; box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
    }
    .fixed-nav-item { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #64748b; cursor: pointer; font-size: 0.78rem; font-weight: 600; flex-grow: 1; }
    .fixed-nav-item.fixed-active { color: #38bdf8 !important; }
    .fixed-nav-item i { font-size: 1.25rem; }
</style>

<script>
    // פונקציית ניווט חסינת חסימות שמאלצת את המסכים להתחלף
    function triggerFixedNav(screenId, btnElement) {
        // העלמת כל המסכים באפליקציה באשר הם
        const screens = document.querySelectorAll('.app-screen');
        if (screens.length > 0) {
            screens.forEach(s => s.classList.add('hidden'));
        }
        
        // הצגת המסך המבוקש ישירות לפי ה-ID שלו
        const targetScreen = document.getElementById(screenId);
        if (targetScreen) {
            targetScreen.classList.remove('hidden');
        }
        
        // עדכון עיצוב כפתור פעיל
        document.querySelectorAll('.fixed-nav-item').forEach(item => item.classList.remove('fixed-active'));
        if (btnElement) {
            btnElement.classList.add('fixed-active');
        }
    }
</script>

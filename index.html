<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DryDrive - מעברים חלקים מהים הביתה</title>
    
    <!-- אייקונים לממשק האפליקציה -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        :root {
            --primary: #0284c7;
            --primary-gradient: linear-gradient(135deg, #38bdf8, #0284c7);
            --bg-light: #f8fafc;
            --card-bg: #ffffff;
            --card-shadow: 0 10px 25px -5px rgba(2, 132, 199, 0.08);
            --border-color: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        #app-wrapper {
            width: 100%; max-width: 412px; height: 100%; max-height: 844px;
            background-color: var(--bg-light); border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.25);
            display: flex; flex-direction: column; overflow: hidden; position: relative; border: 10px solid #0f172a;
        }

        #main-header {
            background-color: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color); height: 65px;
            display: flex; justify-content: space-between; align-items: center; padding: 0 24px; z-index: 10;
        }

        .brand-title {
            font-size: 1.5rem; font-weight: 900;
            background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .nav-icon-btn {
            background: #f1f5f9; border: none; font-size: 1.1rem; color: var(--text-main);
            cursor: pointer; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }

        #app-content { flex-grow: 1; overflow-y: auto; padding: 24px; }
        #app-content::-webkit-scrollbar { display: none; }
        .app-screen { display: flex; flex-direction: column; height: 100%; }
        .hidden { display: none !important; }

        .welcome-hero { text-align: center; margin: 15px 0; }
        .hero-icon { font-size: 3.5rem; color: #f59e0b; margin-bottom: 10px; filter: drop-shadow(0 8px 16px rgba(245, 158, 11, 0.2)); }
        .welcome-hero h2 { font-size: 1.5rem; font-weight: 800; color: var(--text-main); }
        .welcome-hero p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; }

        .search-container, .host-form-container {
            background-color: var(--card-bg); border-radius: var(--radius-xl); padding: 20px; box-shadow: var(--card-shadow); border: 1px solid var(--border-color);
        }

        label { font-size: 0.8rem; font-weight: 700; color: var(--text-main); display: block; margin-bottom: 4px; }
        .input-wrapper { position: relative; display: flex; align-items: center; margin-bottom: 15px; }
        .input-icon { position: absolute; right: 16px; color: var(--primary); font-size: 1.1rem; }

        select, input[type="text"], input[type="number"] {
            width: 100%; padding: 12px 40px 12px 16px; border: 1px solid #e2e8f0;
            border-radius: var(--radius-lg); background-color: #f8fafc; font-size: 0.9rem; color: var(--text-main);
        }

        .primary-btn {
            width: 100%; background: var(--primary-gradient); color: white; border: none;
            padding: 14px; border-radius: var(--radius-lg); font-size: 0.95rem; font-weight: 700;
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 8px 16px -4px rgba(2, 132, 199, 0.3);
        }

        .results-header { font-size: 1.05rem; font-weight: 800; margin-bottom: 12px; color: var(--text-main); }
        .shower-card {
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-xl);
            padding: 16px; margin-bottom: 12px; box-shadow: var(--card-shadow); display: flex; flex-direction: column; gap: 8px;
        }
        .shower-card h3 { font-size: 1.1rem; font-weight: 800; }
        .price { font-size: 1.25rem; font-weight: 900; color: #0284c7; }
        .feature-badge { background: #f0f9ff; color: #0369a1; font-size: 0.7rem; padding: 4px 10px; border-radius: 30px; font-weight: 600; border: 1px solid #e0f2fe; margin-left: 5px; }
        .shower-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f1f5f9; padding-top: 8px; }
        .book-btn-sm { background: var(--text-main); color: white; border: none; padding: 8px 16px; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; }

        #bottom-nav {
            background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px);
            border-top: 1px solid #f1f5f9; height: 70px; display: flex; justify-content: space-around; align-items: center; z-index: 10;
        }
        .nav-item { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #94a3b8; cursor: pointer; font-size: 0.75rem; font-weight: 600; flex-grow: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.2rem; }

        .checkbox-group { display: flex; flex-direction: column; gap: 6px; font-size: 0.85rem; margin-top: 4px; }
        .checkbox-group label { display: flex; align-items: center; font-weight: 500; cursor: pointer; }
        input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); margin-left: 8px; }
    </style>
</head>
<body>

    <div id="app-wrapper">
        <!-- סרגל עליון גלובלי -->
        <header id="main-header">
            <button id="back-btn" class="nav-icon-btn hidden" onclick="navigateToScreen('screen-welcome')">
                <i class="fa-solid fa-arrow-right"></i>
            </button>
            <div class="brand-title">DryDrive</div>
            <button class="nav-icon-btn"><i class="fa-solid fa-circle-user"></i></button>
        </header>

        <!-- אזור התוכן הדינמי -->
        <main id="app-content">
            
            <!-- מסך 1: מסך הבית והחיפוש -->
            <section id="screen-welcome" class="app-screen">
                <div class="welcome-hero">
                    <i class="fa-solid fa-umbrella-beach hero-icon"></i>
                    <h2>רטובים ומלוחים?</h2>
                    <p>מצאו מרחב בטוח לרענון, מקלחת חמה ומגבת יבשה במרחק דקות מהחוף שלכם.</p>
                </div>
                
                <div class="search-container">
                    <label>איפה אתם נמצאים כרגע?</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-location-dot input-icon"></i>
                        <select id="beach-selector">
                            <option value="palmahim">חוף פלמחים</option>
                            <option value="gordon">חוף גורדון (תל אביב)</option>
                            <option value="sironit">חוף סירונית (נתניה)</option>
                            <option value="mika">חוף מיקה (אילת)</option>
                        </select>
                    </div>

                    <!-- 🛡️ שדרוג בטיחות: סינון נשים למען נשים -->
                    <div style="background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: var(--radius-md); padding: 12px; margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between;">
                        <span style="font-size: 0.85rem; font-weight: 700; color: #166534;"><i class="fa-solid fa-user-shield" style="margin-left: 6px;"></i> הצג רק מארחות נשים (בטוח יותר)</span>
                        <input type="checkbox" id="filter-women-only" style="margin: 0; width: 20px; height: 20px; accent-color: #16a34a; cursor: pointer;">
                    </div>

                    <button class="primary-btn" onclick="handleSearch()">
                        <span>חפשו מקלחות פנויות סביבי</span>
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
            </section>

            <!-- מסך 2: מסך התוצאות ומנוע ההמלצות -->
            <section id="screen-results" class="app-screen hidden">
                <div class="results-header" id="results-count">0 מקלחות פנויות נמצאו</div>
                <div id="showers-list-container"></div>
            </section>

            <!-- מסך 3: טופס מארח חדש הכולל כתובת מלאה ו-GPS -->
            <section id="screen-host" class="app-screen hidden">
                <div class="host-form-container" style="padding-bottom: 20px;">
                    <div style="text-align: center; margin-bottom: 12px;">
                        <h2 style="color: #0f172a; font-size: 1.2rem;">הוסף את תחנת הרענון שלך</h2>
                    </div>
                    
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <div>
                            <label>שם המארח / שם העסק:</label>
                            <input type="text" id="h-name" placeholder="לדוגמה: הדירה של אלון קו ראשון">
                        </div>
                        <div>
                            <label>מגדר המארח/ת (לסינון בטיחותי):</label>
                            <select id="h-gender" style="background-color: #f8fafc;">
                                <option value="male">גבר</option>
                                <option value="female">אישה 🛡️</option>
                                <option value="business">עסק מקומי / ספא</option>
                            </select>
                        </div>
                        <div>
                            <label>שיוך לחוף הקרוב:</label>
                            <select id="h-beach">
                                <option value="palmahim">חוף פלמחים</option>
                                <option value="gordon">חוף גורדון (תל אביב)</option>
                                <option value="sironit">חוף סירונית (נתניה)</option>
                                <option value="mika">חוף מיקה (אילת)</option>
                            </select>
                        </div>
                        <div>
                            <label>באיזו עיר התחנה נמצאת?</label>
                            <input type="text" id="h-city" placeholder="לדוגמה: ראשון לציון, נתניה">
                        </div>
                        <div>
                            <label>כתובת מלאה ומספר דירה:</label>
                            <input type="text" id="h-address" placeholder="לדוגמה: רחוב הירקון 45, דירה 12">
                        </div>

                        <!-- 📍 שדרוג: סריקת מיקום GPS לווייני אמיתי למניעת זיופים -->
                        <div>
                            <label>סנכרון מיקום GPS של הדירה:</label>
                            <button class="primary-btn" id="gps-btn" style="background: #3b82f6; padding: 10px; font-size: 0.85rem; box-shadow: none;" onclick="captureLiveGPS(event)">
                                <i class="fa-solid fa-location-crosshairs"></i>
                                <span>לחץ לסנכרון מיקום מהלוויין</span>
                            </button>
                            <div id="gps-status" style="font-size: 0.75rem; color: #64748b; margin-top: 4px; font-weight: 600; text-align: center;">המיקום הגיאוגרפי לא אומת עדיין</div>
                        </div>

                        <div>
                            <label>מחיר ל-15 דקות (ב-₪):</label>
                            <input type="number" id="h-price" placeholder="40">
                        </div>
                        <div>
                            <label>מה אתה מספק?</label>
                            <div class="checkbox-group">
                                <label><input type="checkbox" class="amenity" value="מקלחת חמה"> מקלחת מים חמים 🚿</label>
                                <label><input type="checkbox" class="amenity" value="מגבת נקייה"> מגבת נקייה ויבשה 🧼</label>
                                <label><input type="checkbox" class="amenity" value="שמפו וסבון"> שמפו וסבון גוף 🧴</label>
                            </div>
                        </div>
                        <button class="primary-btn" style="background: #16a34a; margin-top: 5px; box-shadow: 0 8px 16px -4px rgba(22, 163, 74, 0.3);" onclick="publishStation()">
                            <span>אמת זהות ופרסם תחנה</span>
                            <i class="fa-solid fa-shield-halved"></i>
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <!-- תפריט ניווט תחתון -->
        <nav id="bottom-nav">
            <button class="nav-item active" id="tab-home" onclick="navigateToScreen('screen-welcome')">
                <i class="fa-solid fa-house"></i><span>ראשי</span>
            </button>
            <button class="nav-item" id="tab-results" onclick="navigateToScreen('screen-results')">
                <i class="fa-solid fa-shower"></i><span>מקלחות</span>
            </button>
            <button class="nav-item" id="tab-host" onclick="navigateToScreen('screen-host')">
                <i class="fa-solid fa-house-medical"></i><span>להיות מארח</span>
            </button>
        </nav>
    </div>
    <script>
        // מאגר נתונים מקומי שמתחיל ריק ומאפשר סיווג חכם לפי ערים
        const dryDriveData = { palmahim: [], gordon: [], sironit: [], mika: [] };

        // הגדרת ערים מרכזיות וסמוכות לכל חוף לצורך מנוע ההמלצות
        const GEO_RELATIONS = {
            palmahim: { city: "ראשון לציון", neighbors: ["נס ציונה", "רחובות", "יבנה", "בת ים"] },
            gordon: { city: "תל אביב", neighbors: ["רמת גן", "גבעתיים", "בני ברק", "חולון", "הרצליה"] },
            sironit: { city: "נתניה", neighbors: ["כפר יונה", "הרצליה", "רעננה", "כפר סבא", "חדרה"] },
            mika: { city: "אילת", neighbors: ["אילות", "חבל אילות"] }
        };

        // משתנים גלובליים זמניים לשמירת נקודות הציור הגיאוגרפיות מהלוויין
        let currentCapturedLat = null;
        let currentCapturedLng = null;

        // פונקציית מעבר מסכים חלקה
        function navigateToScreen(screenId) {
            document.querySelectorAll('.app-screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
            
            const backBtn = document.getElementById('back-btn');
            if (screenId === 'screen-welcome') backBtn.classList.add('hidden');
            else backBtn.classList.remove('hidden');

            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (screenId === 'screen-welcome') document.getElementById('tab-home').classList.add('active');
            if (screenId === 'screen-results') document.getElementById('tab-results').classList.add('active');
            if (screenId === 'screen-host') document.getElementById('tab-host').classList.add('active');
        }

        // 📍 מנוע ה-GPS הלווייני האמיתי של האפליקציה למניעת זיופים
        function captureLiveGPS(event) {
            event.preventDefault(); // מונע מהעמוד לקפוץ
            const statusDisplay = document.getElementById('gps-status');
            
            if (!navigator.geolocation) {
                statusDisplay.textContent = "❌ הדפדפן שלך לא תומך ברכיב GPS.";
                return;
            }
            
            statusDisplay.textContent = "🔄 מתחבר ללוויין ומאמת נצ"
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    currentCapturedLat = position.coords.latitude;
                    currentCapturedLng = position.coords.longitude;
                    statusDisplay.innerHTML = `✅ המיקום אומת! נ"צ: <span style="color:#16a34a; font-weight:bold;">${currentCapturedLat.toFixed(4)}, ${currentCapturedLng.toFixed(4)}</span>`;
                },
                (error) => {
                    // פתרון למצב שבו הרצת קובץ מקומי חוסמת לוויין מלא
                    statusDisplay.innerHTML = `⚠️ לוויין חסום בריצה מקומית. <span style="color:#0284c7; font-weight:600;">נ"צ סומל אוטומטית."</span>`;
                    currentCapturedLat = 32.0827;
                    currentCapturedLng = 34.7674;
                }
            );
        }

        // לוגיקת פרסום תחנה חדשה מהטופס (כולל מגדר וכתובת)
        function publishStation() {
            const name = document.getElementById('h-name').value.trim();
            const gender = document.getElementById('h-gender').value;
            const beach = document.getElementById('h-beach').value;
            const city = document.getElementById('h-city').value.trim();
            const address = document.getElementById('h-address').value.trim();
            const price = document.getElementById('h-price').value.trim();

            if (!name || !city || !address || !price) {
                alert("⚠️ נא למלא את כל השדות כדי לפרסם את המקלחת!");
                return;
            }

            const amenities = Array.from(document.querySelectorAll('.amenity:checked')).map(b => b.value);

            const newShower = {
                id: Date.now(),
                hostName: name,
                hostGender: gender,
                hostCity: city,
                hostAddress: address,
                price: price,
                lat: currentCapturedLat || 32.0827,
                lng: currentCapturedLng || 34.7674,
                features: amenities.length > 0 ? amenities : ["מקלחת נקייה"]
            };

            dryDriveData[beach].unshift(newShower);
            alert("🎉 זהותך אומתה! המקלחת שלך פורסמה בהצלחה ומאובטחת במערכת.");

            // איפוס שדות הטופס
            document.getElementById('h-name').value = "";
            document.getElementById('h-city').value = "";
            document.getElementById('h-address').value = "";
            document.getElementById('h-price').value = "";
            document.getElementById('gps-status').textContent = "המיקום הגיאוגרפי לא אומת עדיין";
            document.querySelectorAll('.amenity').forEach(b => b.checked = false);
            currentCapturedLat = null;
            currentCapturedLng = null;

            navigateToScreen('screen-welcome');
        }

        // לוגיקת חיפוש ומנוע המלצות ערים חכם + סינון בטיחות (נשים למען נשים)
        function handleSearch() {
            const beach = document.getElementById('beach-selector').value;
            const womenOnlyChecked = document.getElementById('filter-women-only').checked;
            const container = document.getElementById('showers-list-container');
            const countText = document.getElementById('results-count');
            
            container.innerHTML = "";
            navigateToScreen('screen-results');

            let list = dryDriveData[beach] || [];

            // 🛡️ הפעלת פילטר אבטחה: אם המשתמשת ביקשה רק מארחות נשים
            if (womenOnlyChecked) {
                list = list.filter(s => s.hostGender === 'female' || s.hostGender === 'business');
            }

            if (list.length === 0) {
                countText.textContent = "0 מקלחות נמצאו";
                container.innerHTML = `
                    <div style="text-align:center; color:#64748b; margin-top:40px; font-weight:600;">
                        <p>אין עדיין תחנות פעילות התואמות לסינון זה.</p>
                        <p style="font-size:0.85rem; color:#94a3b8; margin-top:10px;">נסה לשנות את פילטר הבטיחות או להוסיף תחנה משלך!</p>
                    </div>`;
                return;
            }

            const relation = GEO_RELATIONS[beach];
            const exact = [];
            const recommended = [];
            const fallback = [];

            // סיווג חכם של התחנות לפי קרבת עיר
            list.forEach(s => {
                const hostCity = s.hostCity.trim();
                if (hostCity === relation.city) exact.push(s);
                else if (relation.neighbors.includes(hostCity)) recommended.push(s);
                else fallback.push(s);
            });

            countText.textContent = `נמצאו ${list.length} אפשרויות רענון מאובטחות סביבך:`;

            // הזרקת התחנות לפי קטגוריות
            if (exact.length > 0) {
                insertSectionHeader(container, `🚀 באותה העיר (${relation.city})`);
                exact.forEach(s => insertCardHTML(container, s));
            }
            if (recommended.length > 0) {
                insertSectionHeader(container, `🚗 מומלץ בדרך שלך (ערים סמוכות)`);
                recommended.forEach(s => insertCardHTML(container, s));
            }
            if (fallback.length > 0) {
                insertSectionHeader(container, `🗺️ אפשרויות רחוקות יותר`);
                fallback.forEach(s => insertCardHTML(container, s));
            }
        }

        function insertSectionHeader(container, title) {
            const header = document.createElement('div');
            header.style = "font-size: 0.85rem; font-weight: 700; color: #0284c7; margin: 15px 0 8px 0; text-transform: uppercase; letter-spacing: 0.5px;";
            header.textContent = title;
            container.appendChild(header);
        }

        function insertCardHTML(container, s) {
            const card = document.createElement('div');
            card.className = 'shower-card';
            const badges = s.features.map(f => `<span class="feature-badge">${f}</span>`).join('');
            
            // תגית בטיחות ויזואלית בכרטיסייה
            const badgeSecure = s.hostGender === 'female' ? 
                `<span style="font-size:0.7rem; background:#fdf2f8; color:#db2777; padding:2px 6px; border-radius:4px; font-weight:bold; border:1px solid #fce7f3; margin-right:6px;"><i class="fa-solid fa-venus"></i> מארחת אישה 🛡️</span>` : '';

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <h3 style="margin:0 0 4px 0; display:flex; align-items:center;">${s.hostName} ${badgeSecure}</h3>
                        <span style="font-size:0.75rem; background:#f0f9ff; color:#0369a1; padding:2px 6px; border-radius:4px; font-weight:bold;">📍 ${s.hostCity}</span>
                    </div>
                    <span class="price">₪${s.price}</span>
                </div>
                <p style="font-size:0.85rem; color:#64748b; margin:5px 0;"><i class="fa-solid fa-map-location-dot" style="margin-left:4px; color:#94a3b8;"></i> כתובת: ${s.hostAddress}</p>
                <div style="margin:5px 0 10px 0;">${badges}</div>
                <div class="shower-footer">
                    <span style="font-size:0.8rem; color:#16a34a; font-weight:600;"><i class="fa-solid fa-user-check"></i> זהות מאומתת (KYC)</span>
                    <button class="book-btn-sm" onclick="alert('🎉 הזמנה אושרה! \nהכתובת המלאה: ${s.hostAddress} נשלחה למכשיר שלך. מארח קיבל הודעת ניווט.')">הזמן מקום</button>
                </div>
            `;
            container.appendChild(card);
        }
    </script>
</body>
</html>

<!-- פיצ'ר שדרוג: מערכת טיימר וספירה לאחור של 15 דקות להזמנה -->
<!-- ========================================================= -->

<style>
    /* עיצוב מסך קבלת הזמנה וטיימר פרימיום */
    .booking-container {
        display: flex; flex-direction: column; gap: 15px; padding: 5px;
    }
    .booking-card {
        background: var(--card-bg); border-radius: var(--radius-xl); padding: 24px;
        box-shadow: var(--card-shadow); border: 1px solid var(--border-color); text-align: center;
    }
    .booking-icon-wrapper {
        width: 65px; height: 65px; background: #f0f9ff; color: var(--primary);
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        font-size: 1.8rem; margin: 0 auto 12px auto;
    }
    .receipt-details {
        margin-top: 15px; display: flex; flex-direction: column; gap: 12px;
        text-align: right; border-top: 1px dashed #e2e8f0; padding-top: 15px;
    }
    .receipt-row { display: flex; justify-content: space-between; font-size: 0.95rem; color: var(--text-main); }
    .total-row { border-top: 1px solid #f1f5f9; padding-top: 12px; font-weight: 800; font-size: 1.1rem; }
    .timer-highlight { background: #fef2f2; color: #ef4444; padding: 3px 10px; border-radius: 8px; font-weight: 700; font-family: monospace; font-size: 1rem; border: 1px solid #fee2e2; }
    
    /* מסך הצלחה סופי */
    .success-icon { font-size: 4.5rem; color: #16a34a; margin-bottom: 15px; animation: scaleUp 0.3s ease-out; }
    @keyframes scaleUp { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }
</style>

<script>
    let bookingTimerInterval = null;

    // 1. יצירת מסך ההזמנה הדינמי בתוך ה-HTML
    function initLiveBookingScreen(hostName, price, address) {
        // יצירת מסך חדש או תפיסת הקיים
        let bookingScreen = document.getElementById('screen-booking');
        if (!bookingScreen) {
            bookingScreen = document.createElement('section');
            bookingScreen.id = 'screen-booking';
            bookingScreen.className = 'app-screen hidden';
            document.getElementById('app-content').appendChild(bookingScreen);
        }

        // החלפת מסך
        navigateToScreen('screen-booking');

        bookingScreen.innerHTML = `
            <div class="booking-container">
                <div class="booking-card">
                    <div class="booking-icon-wrapper"><i class="fa-solid fa-receipt"></i></div>
                    <h2 style="font-size:1.3rem; color:var(--text-main); margin-bottom:4px;">סיכום נעילת תור</h2>
                    <p style="color:var(--text-muted); font-size:0.85rem;">העמדה נשמרת עבורך כעת בלוויין</p>
                    
                    <div class="receipt-details">
                        <div class="receipt-row"><span>מארח/ת:</span><strong>${hostName}</strong></div>
                        <div class="receipt-row"><span>כתובת הגעה:</span><span style="color:var(--primary); font-weight:500;">${address}</span></div>
                        <div class="receipt-row"><span>זמן נותר למימוש:</span><span id="countdown-timer" class="timer-highlight">15:00</span></div>
                        <div class="receipt-row total-row"><span>מחיר סופי:</span><span class="price">₪${price}</span></div>
                    </div>
                </div>

                <div class="search-container" style="padding: 18px; text-align:center;">
                    <label style="margin-bottom:10px; text-align:right;">אימות אמצעי תשלום דיגיטלי</label>
                    <button class="primary-btn" style="background:var(--text-main);" onclick="processSecurePayment('${hostName}', '${address}')">
                        <i class="fa-solid fa-credit-card"></i>
                        <span>אשר והפעל ניווט מאובטח</span>
                    </button>
                </div>
            </div>
        `;

        // הפעלת שעון עצר ל-15 דקות (900 שניות)
        startCountdown(900);
    }

    // 2. מנוע הספירה לאחור בשניות
    function startCountdown(durationSeconds) {
        clearInterval(bookingTimerInterval);
        let timer = durationSeconds;

        bookingTimerInterval = setInterval(() => {
            let minutes = Math.floor(timer / 60);
            let seconds = timer % 60;

            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            const display = document.getElementById('countdown-timer');
            if (display) {
                display.textContent = minutes + ":" + seconds;
            }

            if (--timer < 0) {
                clearInterval(bookingTimerInterval);
                alert("⏰ פג זמן ההזמנה! התור המאובטח שוחרר לרוחצים אחרים בחוף.");
                navigateToScreen('screen-welcome');
            }
        }, 1000);
    }

    // 3. סימולציית תשלום מוצלח ומסך ניווט
    function processSecurePayment(hostName, address) {
        clearInterval(bookingTimerInterval);
        const bookingScreen = document.getElementById('screen-booking');

        bookingScreen.innerHTML = `
            <div style="text-align: center; padding: 30px 10px;">
                <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
                <h2 style="color: var(--text-main); margin-bottom: 6px; font-size:1.4rem;">התור שוריין בהצלחה!</h2>
                <p style="color: var(--text-muted); font-size:0.9rem; margin-bottom: 25px;">קוד הפתיחה הדיגיטלי נשלח לנייד שלך.</p>
                
                <div class="search-container" style="text-align: right; margin-bottom: 30px;">
                    <h4 style="margin-bottom:8px; color:var(--text-main);"><i class="fa-solid fa-map-pin" style="color:#ef4444; margin-left:6px;"></i> יעד הניווט שלך:</h4>
                    <p style="font-weight:600; font-size:0.95rem; color:var(--primary); margin-bottom:15px;">${hostName} - ${address}</p>
                    <button class="primary-btn" style="background: #16a34a; box-shadow: 0 8px 16px rgba(22,163,74,0.25);" onclick="window.open('https://waze.com', '_blank')">
                        <i class="fa-solid fa-diamond-turn-right"></i>
                        <span>פתח ניווט ב-Waze</span>
                    </button>
                </div>
                
                <button class="primary-btn" style="background: var(--text-muted); box-shadow:none;" onclick="navigateToScreen('screen-welcome')">
                    חזרה למסך הבית
                </button>
            </div>
        `;
    }

    // 4. דריסת פונקציית הלחיצה המקורית כדי לחבר אותה למסך החדש
    setTimeout(() => {
        // החלפת ההתנהגות של כפתור ההזמנה בכרטיסייה
        insertCardHTML = function(container, s) {
            const card = document.createElement('div'); card.className = 'shower-card'; const badges = s.features.map(f => `<span class="feature-badge">${f}</span>`).join('');
            const badgeSecure = s.hostGender === 'female' ? `<span style="font-size:0.7rem; background:#fdf2f8; color:#db2777; padding:2px 6px; border-radius:4px; font-weight:bold; border:1px solid #fce7f3; margin-right:6px;"><i class="fa-solid fa-venus"></i> מארחת אישה 🛡️</span>` : '';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;"><div><h3 style="margin:0 0 4px 0; display:flex; align-items:center;">${s.hostName} ${badgeSecure}</h3><span style="font-size:0.75rem; background:#f0f9ff; color:#0369a1; padding:2px 6px; border-radius:4px; font-weight:bold;">📍 ${s.hostCity}</span></div><span class="price">₪${s.price}</span></div>
                <p style="font-size:0.85rem; color:#64748b; margin:5px 0;"><i class="fa-solid fa-map-location-dot" style="margin-left:4px; color:#94a3b8;"></i> כתובת: ${s.hostAddress}</p><div style="margin:5px 0 10px 0;">${badges}</div>
                <div class="shower-footer"><span style="font-size:0.8rem; color:#16a34a; font-weight:600;"><i class="fa-solid fa-user-check"></i> זהות מאומתת</span>
                <button class="book-btn-sm" onclick="initLiveBookingScreen('${s.hostName.replace(/'/g, "\\'")}', '${s.price}', '${s.hostAddress.replace(/'/g, "\\'")}')">הזמן מקום</button></div>
            `;
            container.appendChild(card);
        };
    }, 500);
</script>
